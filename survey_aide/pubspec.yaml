name: survey_aide
description: Survey Aide — All-in-one survey tool for geodetic engineers
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.0
  drift: ^2.23.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  table_calendar: ^3.1.3
  share_plus: ^13.1.0
  pdf: ^3.11.3
  printing: ^5.14.1
  intl: ^0.20.2
  uuid: ^4.5.1
  path: ^1.9.1
  flutter_svg: ^2.0.17
  photo_view: ^0.15.0
  file_picker: ^12.0.0-beta.7
  google_fonts: ^6.1.0
  animations: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.23.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/services.json
    - assets/database/reference.db

